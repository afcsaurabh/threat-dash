version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./demo:/app/demo
      - db-data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/threat_dash.db
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  db-data:
