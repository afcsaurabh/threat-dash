<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>threat-dash</title>
    <!-- GitHub Pages SPA redirect: restore path encoded by 404.html -->
    <script>
      (function () {
        var redirect = sessionStorage.redirect
        delete sessionStorage.redirect
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect)
        }
        // Decode path from ?p= query param written by 404.html
        var qs = window.location.search
        if (qs) {
          var match = qs.match(/[?&]p=([^&]+)/)
          if (match) {
            var path = '/' + match[1].replace(/~and~/g, '&')
            window.history.replaceState(null, null, path + (qs.replace(/[?&]p=[^&]+/, '') || ''))
          }
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
