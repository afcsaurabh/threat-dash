<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // Redirect deep links back to index.html preserving the path.
      // Encodes the path into the query string so GitHub Pages doesn't 404.
      var seg = 1 // number of path segments to keep (1 = /threat-dash)
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
